#      ddl-auto: create
#    show-sql: true
#  h2:
#    console:
#      enabled: true
#      path: /h2-console

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*" #or specific ones like: beans, health, info, metrics
  endpoint:
    shutdown:
      enabled: true
    health:
      show-details: always #or use when-authorized if needed
  info:
    env:
      enabled: true

info:
  app:
    name: MyNewApp
    description: MyNewApp
    version: 1.0.0

