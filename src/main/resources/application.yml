spring:
  application:
    name: ecom-application
  datasource:
    url: jdbc:postgresql://localhost:5432/ecomdb #or embarkx to use the db automatically created and assoc with the user
    driver-class-name: org.postgresql.Driver
    username: embarkx
    password: embarkx
  jpa:
    database: PostgreSQL
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
#    url: jdbc:h2:mem:test
#    driver-class-name: org.h2.Driver
